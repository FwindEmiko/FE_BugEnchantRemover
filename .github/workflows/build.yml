name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. 多版本编译测试 - 验证插件在不同 Paper API 版本下的兼容性
  compile-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        paper-api:
          - "1.18.2-R0.1-SNAPSHOT"  # 最低支持版本
          - "1.19.4-R0.1-SNAPSHOT"  # 中间版本
          - "1.20.4-R0.1-SNAPSHOT"  # 稳定版
          - "1.21.11-R0.1-SNAPSHOT" # 最新版
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Paper API ${{ matrix.paper-api }}
        run: mvn clean compile -Dpaper.api.version=${{ matrix.paper-api }}

      - name: Upload artifact (Paper ${{ matrix.paper-api }})
        if: matrix.paper-api == '1.20.4-R0.1-SNAPSHOT'
        uses: actions/upload-artifact@v4
        with:
          name: BugEnchantRemover-${{ matrix.paper-api }}
          path: target/*.jar

  # 2. 完整打包
  package:
    runs-on: ubuntu-latest
    needs: compile-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BugEnchantRemover
          path: target/*.jar

      - name: List artifacts
        run: ls -la target/*.jar
