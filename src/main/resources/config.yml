# BugEnchantRemover 配置文件
# 检测附魔ID或翻译键中包含以下关键词的附魔书
# 关键词可使用指令 /bugenchanttest 获取手中附魔书信息，或直接查看数据包文件获取

# 附魔ID关键词列表（不区分大小写）
# 检查完整ID、命名空间或键名是否包含这些关键词
enchant-id-keywords:
  - "nova_structures"

# 翻译键关键词列表（不区分大小写）
# 检查翻译键是否包含这些关键词
translation-key-keywords:
  - "enchantment.dnt"

# 检查间隔（单位：tick，20tick=1秒）
check-interval: 21

# 是否在控制台记录清除日志
log-removals: true

# 是否记录匹配的关键词详情
log-keyword-matches: true

# 当附魔书的【所有】附魔都是异常附魔时（1个或多个，移除后会导致空附魔书），
# 直接删除整本书以避免产生空附魔书。
# 设为 false 时仅移除异常附魔，可能产生空附魔书（由下方选项决定是否清理）。
remove-enchanted-book-when-all-bug: true

# 是否移除真正的空附魔书（没有任何存储附魔的附魔书）。
# 某些数据包在删除附魔定义后无法彻底关闭生成，会残留空附魔书，此项用于清理它们。
# 注意：被识别为自定义物品(GUI道具)的附魔书不会被移除（见下方保护选项）。
remove-empty-enchanted-book: true

# 自定义物品(GUI道具)保护开关。
# 很多GUI界面物品和道具是以「附魔书 + 自定义数据值」实现的（如自定义显示名、
# CustomModelData、Lore、PersistentData 等）。开启后，检测到这些自定义数据
# 的附魔书不会被当作空书/全异常书删除，避免误删GUI道具。
# 识别为自定义物品的依据（命中任意一项即视为自定义物品）：
#   - 自定义显示名称 / Lore 描述
#   - CustomModelData 自定义模型数据
#   - 修复成本(铁砧) / 不可破坏标记
#   - ItemFlags（如 HIDE_ENCHANTS）/ 自定义属性修饰符 / 伤害值
#   - PersistentDataContainer 自定义NBT数据
protect-custom-items: true

# 提示消息配置
messages:
  actionbar: "帮你清理掉找到的异常附魔书啦~"
  log-prefix: "[星玖姬]"